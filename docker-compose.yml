x-default-logging: &default_logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-health-check-defaults: &health_check_defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

services:
  ntp:
    image: cturra/ntp:latest
    container_name: dns-ntp
    restart: always
    ports:
      - 123:123/udp
    tmpfs:
      - /etc/chrony:rw,mode=1750
      - /run/chrony:rw,mode=1750
      - /var/lib/chrony:rw,mode=1750
    environment:
      - NTP_SERVERS=time.cloudflare.com
      - LOG_LEVEL=0
      - TZ=America/Los_Angeles
      - NOCLIENTLOG=true
      - ENABLE_NTS=true
    logging:
      <<: *default_logging
    healthcheck:
      <<: *health_check_defaults
      test: [ "CMD", "chronyc", "-n", "tracking", "||", "exit", "1" ]
    labels:
      autoheal-app: true

  unbound:
    image: alpinelinux/unbound:latest
    container_name: dns-unbound
    environment:
      - TZ=America/Los_Angeles
    ports:
      - 5354:5353/udp
      - 5354:5353/tcp
    volumes:
      - ./unbound/unbound.conf:/etc/unbound/unbound.conf:ro
      - ./unbound/named.cache:/etc/unbound/root.hints:ro
      - /etc/localtime:/etc/localtime:ro
    restart: always
    logging:
      driver: none
    healthcheck:
      <<: *health_check_defaults
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://cloudflare.com" ]
    labels:
      autoheal-app: true

  caddy:
    image: ghcr.io/gitgc/home-proxy-webserver:main
    container_name: dns-caddy
    restart: unless-stopped
    init: true
    ports:
      - 80:80
      - 443:443/tcp
      - 443:443/udp
    environment:
      - TZ=America/Los_Angeles
      - CADDY_DNS_EMAIL
      - NETDATA_SUBDOMAIN
      - CADDY_DOMAIN
      - CF_AUTH_TOKEN
      - DOH_SUBDOMAIN
    volumes:
      - "./Caddyfile:/etc/caddy/Caddyfile:ro"
      - "./caddy/data/:/data/"
      - "/etc/localtime:/etc/localtime:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      netdata:
        condition: service_healthy
    logging:
      <<: *default_logging
    healthcheck:
      <<: *health_check_defaults
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://$DOH_SUBDOMAIN.$CADDY_DOMAIN/caddy-health-check" ]
    labels:
      autoheal-app: true

  cert-sync:
    image: alpine:latest
    container_name: dns-cert-sync
    restart: unless-stopped
    environment:
      - DOH_SUBDOMAIN
      - CADDY_DOMAIN
      - TZ=America/Los_Angeles
    volumes:
      - "./caddy/data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/:/caddy-certs/:ro"
      - "blocky-certs:/blocky-certs/"
      - "./cert-sync/sync.sh:/sync.sh:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/etc/localtime:/etc/localtime:ro"
    entrypoint: ["sh", "/sync.sh"]
    depends_on:
      caddy:
        condition: service_healthy
    logging:
      <<: *default_logging
    healthcheck:
      <<: *health_check_defaults
      test: ["CMD", "test", "-f", "/blocky-certs/server.crt"]

  blocky:
    image: spx01/blocky:v0.30.0
    container_name: dns-blocky
    environment:
      - TZ=America/Los_Angeles
    ports:
      - 53:53/udp
      - 53:53/tcp
      - 853:853/tcp
    volumes:
      - ./blocky/config.yml:/app/config.yml:ro
      - ./blocky/google-ads-whitelist.txt:/app/google-ads-whitelist.txt:ro
      - "blocky-certs:/certs:ro"
      - "/etc/localtime:/etc/localtime:ro"
    depends_on:
      unbound:
        condition: service_healthy
      caddy:
        condition: service_healthy
      cert-sync:
        condition: service_healthy
    restart: always
    logging:
      <<: *default_logging
    healthcheck:
      <<: *health_check_defaults
      test: ["CMD", "/app/blocky", "healthcheck"]
    labels:
      autoheal-app: true

  netdata:
    image: netdata/netdata
    container_name: dns-netdata
    pid: host
    network_mode: host
    restart: unless-stopped
    environment:
      - NETDATA_CLAIM_TOKEN
      - NETDATA_CLAIM_URL
      - NETDATA_CLAIM_ROOMS
      - DISABLE_TELEMETRY=1
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./netdata/config:/etc/netdata
      - ./netdata/lib:/var/lib/netdata
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /var/cache/netdata:size=512m
    logging:
      <<: *default_logging
    healthcheck:
      <<: *health_check_defaults
      test: [ "CMD", "curl", "-f", "http://localhost:19999/api/v1/info" ]
    labels:
      autoheal-app: true

  autoheal:
    image: willfarrell/autoheal:latest
    network_mode: none
    restart: unless-stopped
    container_name: dns-autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal-app
    logging:
      <<: *default_logging
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  blocky-certs:
